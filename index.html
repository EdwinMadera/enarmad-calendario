<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENARMAD 2026 · Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{
  fontFamily:{sans:['Inter','sans-serif']},
  colors:{brand:{50:'#f0f9ff',100:'#e0f2fe',500:'#0ea5e9',600:'#0284c7',700:'#0369a1'}},
  boxShadow:{'float':'0 2px 8px -1px rgba(0,0,0,0.06)','float-hover':'0 6px 16px -2px rgba(0,0,0,0.1)'}
}}}
</script>
<style>
:root{--pc:#0ea5e9}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f1f5f9;color:#1e293b;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh}

/* ===== LAYOUT: 3-column, single row, no row-span tricks ===== */
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:100vh;height:100vh;transition:grid-template-columns .25s ease}
.app.has-panel{grid-template-columns:220px 1fr 260px}
.app.sb-collapsed{grid-template-columns:0px 1fr}
.app.sb-collapsed.has-panel{grid-template-columns:0px 1fr 260px}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* ===== SIDEBAR ===== */
.sidebar{background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;z-index:20;transition:width .25s ease,opacity .2s}
.app.sb-collapsed .sidebar{overflow:hidden;opacity:0;pointer-events:none}

/* ===== MAIN ===== */
.main-area{display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#f1f5f9}

/* ===== TOPBAR (single bar — tabs + filters + progress) ===== */
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px;padding:0 12px;height:44px;flex-shrink:0;z-index:10;overflow-x:auto;overflow-y:hidden}
.topbar::-webkit-scrollbar{height:0}

/* ===== RIGHT PANEL ===== */
.rpanel{background:#fff;border-left:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;transition:opacity .2s}
.app:not(.has-panel) .rpanel{display:none}

/* ===== CARDS ===== */
.card{border-radius:8px;padding:6px 8px;margin-bottom:3px;cursor:grab;transition:transform .12s,box-shadow .12s;background:#fff;border:1px solid #e8ecf1;position:relative;overflow:hidden}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 12px -2px rgba(0,0,0,0.08);z-index:20}
.card:active{cursor:grabbing;transform:scale(.98)}
.card.dragging{opacity:.35;border-style:dashed}
.card.done{opacity:.45}
.exam-card{background:linear-gradient(135deg,#fef3c7,#fff7ed)!important;border-left:3px solid #f59e0b!important}
.exam-card .c-nm{color:#92400e!important}
.act-caso{background:linear-gradient(135deg,#f0fdf4,#dcfce7)!important;border-left:3px solid #16a34a!important}
.act-caso .c-nm{color:#166534!important}
.act-inter{background:linear-gradient(135deg,#ecfeff,#cffafe)!important;border-left:3px solid #0891b2!important}
.act-inter .c-nm{color:#155e75!important}
.act-repaso{background:linear-gradient(135deg,#fefce8,#fef9c3)!important;border-left:3px solid #ca8a04!important}
.act-repaso .c-nm{color:#854d0e!important}
.act-sim{background:linear-gradient(135deg,#fef2f2,#fee2e2)!important;border-left:3px solid #dc2626!important}
.act-sim .c-nm{color:#991b1b!important}
.card.done .c-nm{text-decoration:line-through;color:#94a3b8}
/* Card name: 2 lines clamp */
.c-nm{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
/* Priority dots */
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pdot.pr0{background:#ef4444}.pdot.pr1{background:#f59e0b}.pdot.pr2{background:#d1d5db}
.card .ca{opacity:0;transition:opacity .12s}
.card:hover .ca{opacity:1}

/* ===== HOVER PREVIEW POPUP ===== */
.preview{display:none;position:fixed;z-index:999;width:320px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 20px 50px -10px rgba(0,0,0,.15),0 0 0 1px rgba(0,0,0,.02);padding:14px 16px;pointer-events:none;animation:fadeIn .15s ease}
.preview.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.preview .pv-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.preview .pv-name{font-size:14px;font-weight:700;color:#1e293b;line-height:1.4;margin-bottom:8px;word-break:break-word}
.preview .pv-row{display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b;margin-bottom:4px}
.preview .pv-label{font-weight:700;color:#94a3b8;font-size:9px;text-transform:uppercase;letter-spacing:.05em;width:50px;flex-shrink:0}
.preview .pv-val{font-weight:600;color:#334155}
.preview .pv-url{font-size:10px;color:#0ea5e9;word-break:break-all;margin-top:4px}
.preview .pv-divider{height:1px;background:#f1f5f9;margin:8px 0}

/* ===== BOARD ===== */
#contWrap{flex:1;overflow:auto}
#cont{overflow-x:auto;overflow-y:auto;padding:12px;height:calc(100vh - 44px)}
.board-row{display:flex;gap:12px}
.day-col{width:210px;flex-shrink:0}
.day-hdr{margin-bottom:6px;position:sticky;top:0;background:#f1f5f9;z-index:5;padding:4px 0}
.dcol{transition:background .15s;border-radius:10px;padding:6px}
.dcol.over{background:#eff6ff;outline:2px dashed var(--pc);outline-offset:-2px}

/* ===== CHECKBOX ===== */
.ck{width:14px;height:14px;border-radius:4px;border:1.5px solid #cbd5e1;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;background:#fff;color:transparent;flex-shrink:0;font-size:8px}
.ck:hover{border-color:var(--pc)}
.ck.on{background:var(--pc);border-color:var(--pc);color:#fff}

/* ===== TOGGLE BTN ===== */
.toggle-btn{position:fixed;right:12px;bottom:12px;z-index:50;width:36px;height:36px;border-radius:50%;background:#fff;color:#64748b;border:1px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.toggle-btn:hover{background:#f8fafc;box-shadow:0 4px 12px rgba(0,0,0,.12);transform:translateY(-1px)}

/* ===== INPUTS ===== */
select,input[type=text],input[type=url],textarea{appearance:none;background:#f8fafc;border:1px solid #e2e8f0;color:#334155;font-family:inherit}
select{background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-position:right 4px center;background-repeat:no-repeat;background-size:1.2em}
select:focus,input:focus,textarea:focus{border-color:var(--pc);outline:none;background:#fff;box-shadow:0 0 0 2px rgba(14,165,233,.1)}

/* ===== TOAST ===== */
#toast{transition:opacity .3s,transform .3s}

/* ===== PANEL ITEMS ===== */
.rp-item{cursor:grab;transition:all .15s}
.rp-item:hover{background:#f8fafc;border-color:#cbd5e1;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.rp-item.dragging{opacity:.3}

.idx-tronco{margin-bottom:8px}
.idx-tronco-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8fafc;border-left:3px solid #3b82f6;border-radius:6px;cursor:pointer;font-size:13px;font-weight:800;color:#1e293b;user-select:none}
.idx-tronco-hdr:hover{background:#f1f5f9}
.idx-tronco-hdr .arrow{font-size:9px;width:12px;color:#94a3b8}
.idx-tronco-hdr .cnt{margin-left:auto;font-size:10px;font-weight:600;color:#94a3b8}
.idx-area{margin:0 0 0 16px}
.idx-area-hdr{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:700;color:#475569;border-radius:4px;user-select:none}
.idx-area-hdr:hover{background:#f1f5f9}
.idx-area-hdr .arrow{font-size:8px;width:10px;color:#94a3b8}
.idx-area-hdr .cnt{margin-left:auto;font-size:9px;font-weight:600;color:#94a3b8;background:#f1f5f9;padding:1px 6px;border-radius:8px}
.idx-table{width:100%;border-collapse:collapse;margin:4px 0 8px 8px;font-size:11px}
.idx-table th{text-align:left;font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;padding:4px 6px;border-bottom:1px solid #e2e8f0}
.idx-table td{padding:3px 6px;border-bottom:1px solid #f1f5f9}
.idx-table tr:hover{background:#f8fafc}
.idx-tema{font-weight:500;color:#334155;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.idx-dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.idx-dot.has{background:#10b981}
.idx-dot.pend{background:#f59e0b}
.idx-dot.miss{background:#e2e8f0}
.idx-search{width:100%;padding:8px 12px 8px 36px;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;outline:none;background:#fff}
.idx-search:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.plat{font-size:9px;margin-left:1px;vertical-align:middle}
</style>
</head>
<body>

<div class="app" id="app">

<!-- ========== SIDEBAR (220px) ========== -->
<div class="sidebar">
  <!-- Brand -->
  <div class="h-11 px-3 flex items-center gap-2.5 border-b border-slate-100 shrink-0">
    <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-black text-xs shadow-sm">E</div>
    <div class="flex-1 min-w-0">
      <div class="text-[12px] font-bold text-slate-800 leading-tight">ENARMAD 2026</div>
      <div class="text-[9px] text-slate-400 font-semibold uppercase tracking-wider">Admin</div>
    </div>
    <button class="w-6 h-6 rounded-md hover:bg-slate-100 text-slate-400 hover:text-slate-600 flex items-center justify-center shrink-0 transition-all" onclick="toggleSidebar()" title="Ocultar menú">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
  </div>
  <!-- Stats mini -->
  <div class="px-3 py-2 border-b border-slate-100 shrink-0">
    <div class="grid grid-cols-4 gap-1">
      <div class="text-center py-1"><div class="text-[9px] text-slate-400 font-bold">Total</div><div class="text-sm font-black text-slate-700" id="sTotal">0</div></div>
      <div class="text-center py-1"><div class="text-[9px] text-emerald-500 font-bold">Hechas</div><div class="text-sm font-black text-emerald-600" id="sDone">0</div></div>
      <div class="text-center py-1"><div class="text-[9px] text-amber-500 font-bold">Faltan</div><div class="text-sm font-black text-amber-600" id="sPend">0</div></div>
      <div class="text-center py-1"><div class="text-[9px] text-blue-500 font-bold">Sem</div><div class="text-sm font-black text-blue-600" id="sWeek">0</div></div>
    </div>
  </div>
  <!-- Week nav -->
  <div class="flex-1 overflow-y-auto px-2 py-1" id="sbNav"></div>
  <!-- Actions -->
  <div class="px-3 py-2 border-t border-slate-100 shrink-0 flex flex-col gap-1.5">
    <button class="w-full py-1.5 bg-slate-800 hover:bg-slate-700 text-white text-[10px] font-bold rounded-md transition-colors flex items-center justify-center gap-1.5" onclick="exportExcel()">
      <svg class="w-3.5 h-3.5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>Excel
    </button>
    <div class="flex gap-1">
      <button class="flex-1 py-1.5 bg-slate-50 hover:bg-slate-100 text-slate-500 text-[10px] font-semibold rounded-md" onclick="exportJSON()">Guardar</button>
      <button class="flex-1 py-1.5 bg-slate-50 hover:bg-slate-100 text-slate-500 text-[10px] font-semibold rounded-md" onclick="document.getElementById('impF').click()">Cargar</button>
    </div>
    <input type="file" id="impF" class="hidden" accept=".json" onchange="importJSON(event)">
    <button class="w-full py-1 text-slate-400 hover:text-red-500 text-[10px] transition-colors" onclick="resetCal()">Restaurar</button>
    <button class="w-full py-1.5 mt-1 bg-blue-50 hover:bg-blue-100 text-blue-600 text-[10px] font-semibold rounded-md transition-colors" onclick="cloudMigrate()">&#9729; Migrar a Sheets</button>
    <button class="w-full py-1 text-blue-400 hover:text-blue-600 text-[10px] transition-colors" onclick="cloudSave().then(()=>toast('Sincronizado'))">&#9729; Forzar Sync</button>
  </div>
</div>

<!-- ========== MAIN AREA ========== -->
<div class="main-area">
  <!-- SINGLE TOPBAR: Tabs + Filters + Progress — all in one row -->
  <div class="topbar" id="topbar">
    <!-- Sidebar toggle -->
    <button class="w-7 h-7 rounded-md hover:bg-slate-100 text-slate-500 hover:text-slate-700 flex items-center justify-center shrink-0 transition-all text-sm font-bold" onclick="toggleSidebar()" title="Menú" id="sbToggle">☰</button>
    <!-- Calendar selector -->
    <div class="flex bg-slate-100 p-0.5 rounded-md shrink-0" id="calTabs"></div>
    <span id="syncBadge" class="px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-100 text-slate-500">&#9729; Local</span>
    <div class="w-px h-5 bg-slate-200 shrink-0"></div>
    <!-- Phase tabs -->
    <div class="flex gap-1 shrink-0" id="pTabs"></div>
    <div class="w-px h-5 bg-slate-200 shrink-0"></div>
    <!-- Search -->
    <div class="relative shrink-0">
      <svg class="w-3.5 h-3.5 absolute left-2 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="fQ" placeholder="Buscar..." class="w-28 pl-7 pr-2 py-1 text-[11px] rounded-md border border-slate-200 bg-slate-50 font-medium" oninput="render()">
    </div>
    <!-- View toggle -->
    <div class="flex bg-slate-100 p-0.5 rounded-md shrink-0">
      <button id="vCal" onclick="setView('cal')" class="px-2.5 py-1 text-[10px] font-bold rounded transition-all bg-white text-slate-700 shadow-sm">Calendario</button>
      <button id="vIdx" onclick="setView('idx')" class="px-2.5 py-1 text-[10px] font-bold rounded transition-all text-slate-400">Índice Maestro</button>
    </div>
    <!-- Filters popover -->
    <div class="relative shrink-0" id="filterWrap">
      <button class="flex items-center gap-1 px-2 py-1 rounded-md text-[10px] font-bold transition-all border border-slate-200 bg-slate-50 hover:bg-white hover:border-slate-300" onclick="toggleFilters()" id="filterBtn">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
        <span>Filtros</span>
        <span class="w-4 h-4 rounded-full bg-blue-500 text-white text-[8px] font-bold items-center justify-center hidden" id="filterCount">0</span>
      </button>
      <div class="absolute top-full left-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-xl p-3 z-50 hidden min-w-[220px]" id="filterPop">
        <div class="flex items-center justify-between mb-2">
          <span class="text-[10px] font-extrabold text-slate-600 uppercase tracking-wider">Filtros</span>
          <button onclick="clearFilters()" class="text-[9px] font-bold text-slate-400 hover:text-red-500 transition-colors">Limpiar</button>
        </div>
        <div class="flex flex-col gap-2">
          <select id="fTr" class="text-[11px] font-semibold rounded-md px-2 py-1.5 border border-slate-200 bg-slate-50 w-full" onchange="render();upFilterCount()"><option value="">Tronco</option></select>
          <select id="fAr" class="text-[11px] font-semibold rounded-md px-2 py-1.5 border border-slate-200 bg-slate-50 w-full" onchange="render();upFilterCount()"><option value="">Área</option></select>
          <select id="fTi" class="text-[11px] font-semibold rounded-md px-2 py-1.5 border border-slate-200 bg-slate-50 w-full" onchange="render();upFilterCount()"><option value="">Tipo</option></select>
          <select id="fPr" class="text-[11px] font-semibold rounded-md px-2 py-1.5 border border-slate-200 bg-slate-50 w-full" onchange="render();upFilterCount()"><option value="">Prioridad</option></select>
          <select id="fEs" class="text-[11px] font-semibold rounded-md px-2 py-1.5 border border-slate-200 bg-slate-50 w-full" onchange="render();upFilterCount()"><option value="">Estado</option></select>
        </div>
      </div>
    </div>
    <!-- Sort toggle -->
    <button id="btnSortType" onclick="sortByType=!sortByType;updSortBtn();render();" class="text-[9px] font-bold px-2 py-1 rounded-md border transition-all shrink-0" title="Ordenar por tipo de actividad">Ev primero</button>
    <!-- Spacer -->
    <div class="flex-1 min-w-2"></div>
    <!-- Mini stats -->
    <div class="flex gap-1.5 shrink-0 items-center">
      <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded" id="csG">0</span>
      <span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded" id="csY">0</span>
      <span class="text-[10px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded" id="csX">0</span>
    </div>
    <div class="w-px h-5 bg-slate-200 shrink-0"></div>
    <!-- Progress -->
    <div class="flex items-center gap-1.5 shrink-0">
      <span id="pPct" class="text-[11px] font-bold text-slate-700">0%</span>
      <div class="w-16 h-1.5 bg-slate-200 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all duration-500" id="pFill" style="background:var(--pc)"></div></div>
      <span id="pNum" class="text-[9px] font-bold text-slate-400"></span>
    </div>
    <div class="w-px h-5 bg-slate-200 shrink-0"></div>
    <div class="text-[9px] font-bold text-slate-400 uppercase tracking-wider shrink-0 whitespace-nowrap" id="cdEl"></div>
  </div>

  <!-- KANBAN BOARD -->
  <div id="contWrap">
    <div id="cont"></div>
  </div>
<div id="idxWrap" style="display:none;flex:1;overflow:auto;padding:16px"><div id="idxCont"></div></div>
</div>

<!-- ========== RIGHT PANEL (260px) ========== -->
<div class="rpanel" id="rpanel">
  <div class="px-3 py-2.5 border-b border-slate-100 shrink-0">
    <div class="flex items-center justify-between mb-2">
      <span class="text-[10px] font-extrabold text-slate-600 uppercase tracking-widest">Disponibles</span>
      <span class="text-[10px] font-bold text-slate-400" id="rpCount">0</span>
    </div>
    <input id="rpQ" placeholder="Filtrar temas..." class="w-full pl-2.5 pr-2 py-1.5 bg-slate-50 border border-slate-200 rounded-md text-[11px] font-medium outline-none transition-all" oninput="renderPanel()">
    <div class="flex flex-wrap gap-1 mt-2" id="rpFilters"></div>
  </div>
  <div class="flex-1 overflow-y-auto px-2 py-1" id="rpList"></div>
</div>

</div>

<!-- Hover Preview Popup -->
<div class="preview" id="preview"></div>

<!-- Toggle panel button -->
<button class="toggle-btn" id="toggleBtn" onclick="togglePanel()" title="Panel de temas">
  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
</button>

<!-- Toast -->
<div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full shadow-lg text-xs font-semibold z-[100] opacity-0 pointer-events-none translate-y-2 flex items-center gap-2">
  <span id="toastMsg"></span>
</div>

<!-- Edit Modal -->
<div class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[200] hidden items-center justify-center" id="editMo">
  <div class="bg-white rounded-xl w-full max-w-md shadow-xl border border-slate-100 overflow-hidden" id="moContent">
    <div class="px-5 py-3 border-b border-slate-100 flex justify-between items-center bg-slate-50">
      <h3 class="text-xs font-bold text-slate-700 truncate pr-4" id="moTitle">Editar</h3>
      <button onclick="closeMo()" class="text-slate-400 hover:text-slate-600 p-0.5"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="p-5 space-y-3">

async function cloudSave(){
  if(!cloudOK||syncing)return;
  syncing=true;
  try{
    const st=items.map(i=>({id:i.id,s:i.s,d:i.d,done:!!i.done,nm:i.nm,url:i.url||'',es:i.es,pr:i.pr,ti:i.ti,ar:i.ar,tr:i.tr,nota:i.nota||'',isNew:!!i.isNew,ord:i.ord!=null?i.ord:0}));

}

async function cloudLoad(k){
  if(!cloudOK)return null;
  try{
    const r=await fetch(API_URL+'?action=loadProgress&cal='+encodeURIComponent(k),{redirect:'follow'});
    const d=await r.json();
    if(Array.isArray(d)&&d.length>0){upSyncBadge('ok');return d;}
  }catch(e){upSyncBadge('err');console.warn('Cloud load:',e);}
  return null;
}

async function cloudMigrate(){
  if(!cloudOK)return toast('Configura API_URL primero');
  toast('Migrando datos a Google Sheets...');
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'migrate',data:R}),redirect:'follow'});
    const d=await r.json();
    if(d.ok)toast('Migrado: '+d.names+' nombres, '+(d.calendars||[]).length+' calendarios');
    else toast('Error: '+(d.error||'desconocido'));
  }catch(e){toast('Error: '+e.message);}
}

function upSyncBadge(s){

  else if(s==='err'){el.textContent='\u2601 Error';el.className='px-1.5 py-0.5 rounded text-[9px] font-bold bg-red-100 text-red-700';}
  else{el.textContent='\u2601 Local';el.className='px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-100 text-slate-500';}
}

function dec(k){
  const c=R.C[k];if(!c)return[];
  return c.data.map(r=>({id:r[0],s:r[1],d:r[2],tr:r[3],ar:r[4],ti:r[5],nm:R.N[r[6]]||'Tema '+r[6],pr:r[7],url:R.U[r[8]]||'',es:r[9],done:false,nota:''}));
}
function dataVer(k){return 'v2_'+R.C[k].data.length+'_'+R.C[k].total;}
function load(k){
  cK=k;meta=R.C[k];
  const d=dec(k);orig=JSON.parse(JSON.stringify(d));items=d;
  const vk='ea10_ver_'+k,cv=dataVer(k);
  const oldVer=localStorage.getItem(vk);
  if(oldVer!==cv){localStorage.removeItem(sk());localStorage.setItem(vk,cv);console.log('Data updated, localStorage cleared for',k);}
  const s=localStorage.getItem(sk());
  if(s){try{
    const sv=JSON.parse(s),m={};sv.forEach(x=>m[x.id]=x);
    items.forEach(i=>{if(m[i.id]){i.s=m[i.id].s;i.d=m[i.id].d;i.done=!!m[i.id].done;if(m[i.id].nm)i.nm=m[i.id].nm;if(m[i.id].url!==undefined)i.url=m[i.id].url;if(m[i.id].es!==undefined)i.es=m[i.id].es;if(m[i.id].pr!==undefined)i.pr=m[i.id].pr;if(m[i.id].ti!==undefined)i.ti=m[i.id].ti;if(m[i.id].ar!==undefined)i.ar=m[i.id].ar;if(m[i.id].tr!==undefined)i.tr=m[i.id].tr;if(m[i.id].nota)i.nota=m[i.id].nota;if(m[i.id].ord!=null)i.ord=m[i.id].ord;}});
    sv.filter(x=>x.isNew&&!items.find(i=>i.id===x.id)).forEach(x=>items.push({...x}));
  }catch(e){}}
  cW=1;cP=0;buildUI();
  // Async: try cloud load and merge
  cloudLoad(k).then(cloud=>{
    if(!cloud||!cloud.length)return;
    const m={};cloud.forEach(x=>m[x.id]=x);
    let changed=false;
    items.forEach(i=>{if(m[i.id]){
      if(m[i.id].done&&!i.done){i.done=true;changed=true;}
      if(m[i.id].nota&&!i.nota){i.nota=m[i.id].nota;changed=true;}
      if(m[i.id].s!==i.s){i.s=m[i.id].s;i.d=m[i.id].d;changed=true;}
      if(m[i.id].ord!=null&&i.ord==null){i.ord=m[i.id].ord;changed=true;}
      if(m[i.id].es!==undefined&&m[i.id].es!==i.es){i.es=m[i.id].es;changed=true;}
      if(m[i.id].pr!==undefined&&m[i.id].pr!==i.pr){i.pr=m[i.id].pr;changed=true;}
    }});
    if(changed){localStorage.setItem(sk(),JSON.stringify(items.map(i=>({id:i.id,s:i.s,d:i.d,done:!!i.done,nm:i.nm,url:i.url||'',es:i.es,pr:i.pr,ti:i.ti,ar:i.ar,tr:i.tr,nota:i.nota||'',isNew:!!i.isNew,ord:i.ord!=null?i.ord:0}))));render();}
  });
}

}

/* ===== REORDER CARDS ===== */
function ensureOrd(s,d){
  const dayItems=items.filter(i=>i.s===s&&i.d===d).sort((a,b)=>{
    const oa=typeof a.ord==='number'?a.ord:999;
    const ob=typeof b.ord==='number'?b.ord:999;
    return sortByType?(a.ti-b.ti||oa-ob||a.pr-b.pr||a.id-b.id):(oa-ob||a.pr-b.pr||a.id-b.id);
  });
  dayItems.forEach((it,idx)=>{it.ord=idx;});
}
function getReorderList(it){
  ensureOrd(it.s,it.d);
  if(sortByType){
    return items.filter(i=>i.s===it.s&&i.d===it.d&&i.ti===it.ti).sort((a,b)=>a.ord-b.ord);
  }
  return items.filter(i=>i.s===it.s&&i.d===it.d).sort((a,b)=>a.ord-b.ord);
}
function moveUp(id){
  id=Number(id);
  const it=items.find(i=>i.id===id);if(!it)return;
  const group=getReorderList(it);
  const idx=group.findIndex(i=>i.id===id);
  if(idx<=0){toast('Ya está arriba');return;}
  const prev=group[idx-1];
  const tmp=it.ord;it.ord=prev.ord;prev.ord=tmp;
  save();render();
  toast('Movido ▲');
}
function moveDown(id){
  id=Number(id);
  const it=items.find(i=>i.id===id);if(!it)return;
  const group=getReorderList(it);
  const idx=group.findIndex(i=>i.id===id);
  if(idx>=group.length-1){toast('Ya está abajo');return;}
  const next=group[idx+1];
  const tmp=it.ord;it.ord=next.ord;next.ord=tmp;
  save();render();
  toast('Movido ▼');
}

/* ===== DRAG & DROP ===== */
function attachDD(el){
  el.querySelectorAll('.card').forEach(c=>{
    const cid=parseInt(c.dataset.id);
    c.addEventListener('dragstart',e=>{hidePV();drag=items.find(i=>i.id==c.dataset.id);setTimeout(()=>c.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','card');});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');drag=null;document.querySelectorAll('.over').forEach(x=>x.classList.remove('over'));});
    c.addEventListener('mouseenter',e=>showPV(e,cid));
    c.addEventListener('mouseleave',hidePV);
  });
  el.querySelectorAll('.dcol').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('over');});
    col.addEventListener('dragleave',()=>col.classList.remove('over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('over');
      const dt=e.dataTransfer.getData('text/plain');
      if(dt==='panel'){
        const nm=e.dataTransfer.getData('t-nm'),tr=parseInt(e.dataTransfer.getData('t-tr'))||0,ar=parseInt(e.dataTransfer.getData('t-ar'))||0,pr=parseInt(e.dataTransfer.getData('t-pr'))||2,url=e.dataTransfer.getData('t-url')||'',ti=parseInt(e.dataTransfer.getData('t-ti'))||0;
        const nid=items.length>0?Math.max(...items.map(i=>i.id))+1:1;
        const ds=parseInt(col.dataset.s),dd=parseInt(col.dataset.d);const maxOrd=items.filter(x=>x.s===ds&&x.d===dd).reduce((mx,x)=>Math.max(mx,x.ord!=null?x.ord:0),0);
        items.push({id:nid,s:ds,d:dd,tr,ar,ti,nm,pr,url,es:url?0:3,nota:'',done:false,isNew:true,ord:maxOrd+1});
        save();buildSb();render();renderPanel();toast('Agregado: '+nm.substring(0,25));return;
      }
      if(!drag)return;const ns=parseInt(col.dataset.s),nd=parseInt(col.dataset.d);drag.s=ns;drag.d=nd;const mxO=items.filter(x=>x.s===ns&&x.d===nd&&x.id!==drag.id).reduce((mx,x)=>Math.max(mx,x.ord!=null?x.ord:0),0);drag.ord=mxO+1;drag=null;save();render();toast('Movida');
    });
  });
}

function popPanel(){

function setPF(v){pF=v;renderPanel();}
function renderPanel(){
  const q=(document.getElementById('rpQ').value||'').toLowerCase(),list=document.getElementById('rpList');
  /* Build available from CATALOG: 650 temas × TEMA_TYPES (Evidencias,Flashcards,Resúmenes) */
  const troncoMap={'Medicina interna':0,'Cirugía':1,'Pediatría':2,'GyO':3};
  const catTopics=[];
  for(const[tronco,areas]of Object.entries(CATALOG)){
    const trIdx=troncoMap[tronco]!=null?troncoMap[tronco]:0;
    for(const[area,temas]of Object.entries(areas)){
      let arIdx=R.A.indexOf(area);if(arIdx<0){for(let ai=0;ai<R.A.length;ai++){if(_norm(R.A[ai])===_norm(area)){arIdx=ai;break;}}};if(arIdx<0)arIdx=0;
      temas.forEach(nm=>{
        TEMA_TYPES.forEach(ti=>{
          catTopics.push({key:nm+'|'+ti,nm:nm,tr:trIdx,ar:arIdx,areaName:area,pr:0,url:'',ti:ti});
        });
      });
    }
  }
  const seen=new Set();const uniq=catTopics.filter(t=>{if(seen.has(t.key))return false;seen.add(t.key);return true;});
  /* Check which are already in calendar by normalized name + type */
  const inC=new Set();items.forEach(i=>{inC.add(i.nm+'|'+i.ti);inC.add(_norm(i.nm)+'|'+i.ti);});
  let tp=uniq.filter(t=>!inC.has(t.key)&&!inC.has(_norm(t.nm)+'|'+t.ti));
  if(pF)tp=tp.filter(t=>_norm(t.areaName||'')===_norm(pF));
  if(q)tp=tp.filter(t=>t.nm.toLowerCase().includes(q));
  tp.sort((a,b)=>a.pr-b.pr||a.nm.localeCompare(b.nm));
  let h='';
  tp.slice(0,200).forEach(t=>{
    const tc=TC[t.ti]||'#64748b';
    h+=`<div class="rp-item bg-white rounded-md p-2 border border-slate-100 flex items-center gap-2 mb-1" draggable="true" data-nm="${t.nm.replace(/"/g,'&quot;')}" data-tr="${t.tr}" data-ar="${t.ar}" data-pr="${t.pr}" data-url="${(t.url||'').replace(/"/g,'&quot;')}" data-ti="${t.ti}">
      <div class="pdot pr${t.pr}"></div>
      <div class="flex-1 min-w-0">
        <div class="text-[10px] font-semibold text-slate-700 truncate">${t.nm}</div>
        <div class="text-[8px] font-bold uppercase tracking-wider mt-0.5"><span style="color:${tc}">${TE[t.ti]} ${TS[t.ti]}</span> <span class="text-slate-400">\u00b7 ${R.A[t.ar]||''}</span></div>
      </div>
    </div>`;
  });
  if(tp.length===0)h='<div class="py-8 text-center text-[10px] font-semibold text-slate-400">Todo asignado \ud83c\udf89</div>';
  list.innerHTML=h;
  document.getElementById('rpCount').textContent=tp.length+' disponibles';
  list.querySelectorAll('.rp-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('text/plain','panel');
      e.dataTransfer.setData('t-nm',el.dataset.nm);e.dataTransfer.setData('t-tr',el.dataset.tr);
      e.dataTransfer.setData('t-ar',el.dataset.ar);e.dataTransfer.setData('t-pr',el.dataset.pr);
      e.dataTransfer.setData('t-url',el.dataset.url||'');e.dataTransfer.setData('t-ti',el.dataset.ti);
      setTimeout(()=>el.classList.add('dragging'),0);e.dataTransfer.effectAllowed='copy';
    });
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  });
}

          const esColor=calItem?(calItem.es===0?'#10b981':'#f59e0b'):'#94a3b8';
          const url=item&&item.url?'<a href="'+item.url+'" target="_blank" style="color:#0ea5e9;font-size:10px">\u2197 Abrir</a>':'\u2014';
          h+='<tr><td class="idx-tema" style="color:'+ct.color+';font-weight:600">'+nm+'</td><td style="text-align:center;font-size:9px;color:#64748b">'+TE[tiIdx]+' '+tipo+'</td><td style="text-align:center;font-size:10px">'+sem+'</td><td style="text-align:center;font-size:10px">'+dia+'</td><td><span style="font-size:9px;font-weight:700;color:'+esColor+'">'+es+'</span></td><td style="text-align:center">'+url+'</td></tr>';
        });
        h+='</tbody></table>';
      } else {
        h+='<div style="padding:12px 16px;font-size:11px;color:#94a3b8;font-style:italic">No hay elementos asignados en este calendario a\u00fan</div>';
      }
    }
    h+='</div>';
  });
  h+='</div>';

  h+='</div>';
  el.innerHTML=h;
}

document.addEventListener('DOMContentLoaded',()=>load('completo'));
</script>
</body>
</html>
